name: Java CI/CD Pipeline to Tomcat

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, Linux]

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 3. Install Maven if missing
      - name: Ensure Maven is installed
        run: |
          if ! command -v mvn &> /dev/null: then
            echo "Maven not found. Installing..."
            sudo dnf install -y maven
          else
            echo "Maven is already installed"
          fi
          mvn -version
       
      # 4. Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path:
            ~/.m2/respository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys:
            ${{ runner.os }}-maven-

      # 5. Build with maven
      - name: Build with maven
        run: mvn clean package -DskipTests

      # 6. Upload WAR as an artifact
      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: target/*.war

  deploy:
    runs-on: [self-hosted, Linux]
    needs: build
    environment: production

    steps:
      # 5. Download WAR artifact
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp
          path: target

      # 6. Deploy to Tomcat
      - name: Deploy to Tomcat
        run: |
          WAR_FILE=$(ls target/*.war)
          echo "Deploying $WAR_FILE to Tomcat..."

          curl -v --upload-file "$WAR_FILE" \
            --user "${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}" \
            "http://${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/myapp&update=true"
